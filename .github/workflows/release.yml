name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full git history for changelogs

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Update CHANGELOG.md
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git describe --abbrev=0 --tags "$(git rev-list --tags --skip=1 --max-count=1)" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          ENTRY="## ${TAG} — ${DATE}\n\n${LOG}\n"

          if [ -f CHANGELOG.md ]; then
            echo -e "${ENTRY}\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "${ENTRY}" > CHANGELOG.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for ${TAG}"
          git push origin HEAD:main

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required only if you use the Homebrew tap in .goreleaser.yml.
          # Create a fine-grained PAT with write access to the homebrew-tap repo
          # and add it as a secret named HOMEBREW_TAP_TOKEN.
          # HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

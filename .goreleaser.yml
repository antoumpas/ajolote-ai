version: 2

project_name: ajolote

before:
  hooks:
    - go mod tidy

builds:
  - id: ajolote
    main: ./cmd/ajolote
    binary: ajolote
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: ajolote
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: antoumpas
    name: ajolote-ai
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"


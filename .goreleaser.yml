version: 2

project_name: ajolote

before:
  hooks:
    - go mod tidy

builds:
  - id: ajolote
    main: ./cmd/ajolote
    binary: ajolote
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: ajolote
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: ajolote-ai
    name: ajolote
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: ajolote
    repository:
      owner: ajolote-ai
      name: homebrew-tap
    commit_author:
      name: ajolote-bot
      email: bot@ajolote.ai
    homepage: https://github.com/ajolote-ai/ajolote
    description: "Shared AI agent configuration for multi-tool teams"
    install: |
      bin.install "ajolote"
    test: |
      system "#{bin}/ajolote", "--version"
